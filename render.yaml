# Render.com Blueprint para Merlin C2
# Este arquivo automatiza o deploy como Background Worker
services:
  - type: web
    name: merlin-c2-web
    env: docker
    region: ohio
    plan: free # Ou 'starter' para 512MB/1GB
    
    envVars:
      - key: PORT
        value: 10000
      - key: GOGC
        value: 50
    
    # Configuração de Persistência (Opcional - Requer plano pago no Render)
    # Se quiser manter os dados entre reboots, descomente as linhas abaixo.
    # Nota: Render Disks custam aprox. $7/mês por 1GB.
    
    # disks:
    #   - name: merlin-data
    #     mountPath: /opt/merlin/data
    #     sizeGB: 1

# Explicação da Estratégia de Web Service:
# Utilizamos um sidecar em Python (healthcheck.py) para responder ao Health Check do Render
# na porta $PORT, permitindo que o Merlin C2 rode em foreground sem ser reiniciado.
