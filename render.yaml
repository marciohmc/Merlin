# Render.com Blueprint para Merlin C2
# Este arquivo automatiza o deploy como Background Worker
services:
  - type: web
    name: merlin-c2-web
    env: docker
    region: ohio
    plan: free # Ou 'starter' para 512MB/1GB
    
    envVars:
      - key: PORT
        value: 10000
      - key: GOGC
        value: 50
    
    # Configuração de Persistência (Opcional - Requer plano pago no Render)
    # Se quiser manter os dados entre reboots, descomente as linhas abaixo.
    # Nota: Render Disks custam aprox. $7/mês por 1GB.
    
    # disks:
    #   - name: merlin-data
    #     mountPath: /opt/merlin/data
    #     sizeGB: 1

# Explicação do Uso de Background Worker:
# O Merlin C2 mantém conexões persistentes (Keep-Alive). No plano 'Web Service', 
# o Render encerraria o processo se não houvesse tráfego HTTP/S válido 
# na porta esperada em menos de 30-60 segundos. O 'Worker' ignora o health check web.
